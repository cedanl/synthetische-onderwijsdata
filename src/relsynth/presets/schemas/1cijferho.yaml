name: 1cijferho
description: >
  Synthetisch schema gebaseerd op de officiële bestandsbeschrijving
  1cyferho_2023_v1.1 (CBS/DUO, CEDA-verwerking).

  Bronformaat: vast-breedte ASCII (EV*XX*.asc), 323 posities per rij.
  De kolommen, posities en categoriecodes zijn rechtstreeks ontleend aan
  de CBS-bestandsbeschrijving; kolomnamen zijn omgezet naar snake_case
  conform de cedanl/1cijferho-tooling.

  Dim/feit-opdeling:
    dim_persoon      – persoonsgebonden_nummer (PGN) als PK + stabiele persoonskenmerken
    dim_opleiding    – opleidingscode (ISAT) als PK + programma-kenmerken
    dim_instelling   – instellingscode (BRIN) als PK
    fac_inschrijving – één rij per inschrijving; PGN/opleiding/instelling als FK
    fac_vak          – één rij per vak per geslaagde VO-student (vakkenbestand)

# ---------------------------------------------------------------------------
# Vaste-breedte veldposities (1-gebaseerd, inclusief begin- én eindpositie)
# Bron: Lay-out bestand, Bestandsbeschrijving_1cyferho_2023_v1.1_DEMO.txt
# ---------------------------------------------------------------------------
fwf:
  ev_inschrijving:
    persoonsgebonden_nummer:              [1,   12]
    inschrijvingsjaar:                    [13,  16]
    instellingscode:                      [17,  20]
    actuele_instelling:                   [21,  24]
    opleidingscode:                       [25,  29]
