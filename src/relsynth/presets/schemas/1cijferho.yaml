    ander_niveau:                         [40,  42]
    ind_diplomavak:                       [43,  43]
    cijfer_schoolexamen:                  [44,  46]
    beoordeling_schoolexamen:             [47,  47]
    cijfer_ce_1:                          [48,  50]
    cijfer_ce_2:                          [51,  53]
    cijfer_ce_3:                          [54,  56]
    eindcijfer_1:                         [57,  58]
    eindcijfer_2:                         [59,  60]
    eindcijfer_3:                         [61,  62]
    cijfer_cijferlijst:                   [63,  64]
    burgerservicenummer:                  [65,  73]
